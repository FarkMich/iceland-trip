<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1b2a">
<title>🧊 Iceland Travel Map</title>
<link rel="manifest" href="/manifest.json">
<meta name="description" content="Live Iceland travel map — roads, wind, campsites, waterfalls and attractions for your Ring Road adventure.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap">
<style>
:root{--bg:#0d1b2a;--bg2:#0f2235;--bg3:#162c45;--border:#1a3650;--accent:#38bdf8;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--amber:#f97316;--purple:#a78bfa;--text:#ddeeff;--muted:#557a99;--card:#0b1e30;--font:'Plus Jakarta Sans',sans-serif;--mono:'DM Mono',monospace;--r:14px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
#loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.ll{font-size:52px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-12px) rotate(5deg)}}
.lt{font-size:20px;font-weight:700;letter-spacing:-.5px}.ls{font-size:12px;color:var(--muted);font-family:var(--mono)}
.lb{width:180px;height:2px;background:var(--bg3);border-radius:2px;overflow:hidden}
.lf{height:100%;background:linear-gradient(90deg,var(--accent),#7dd3fc);width:0%;transition:width .3s}
#app{height:100%;display:flex;flex-direction:column}
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px 10px;padding-top:calc(12px + env(safe-area-inset-top,0px));display:flex;align-items:center;gap:10px;flex-shrink:0}
.ti{font-size:22px}.tt h1{font-size:15px;font-weight:700;letter-spacing:-.3px}.tt p{font-size:11px;color:var(--muted);font-family:var(--mono)}
.sp{flex:1}.ld{width:7px;height:7px;border-radius:50%;background:var(--green);animation:lp 2s infinite}
@keyframes lp{0%,100%{opacity:1;box-shadow:0 0 0 0 #22c55e66}50%{opacity:.6;box-shadow:0 0 0 5px transparent}}
.lv{font-size:10px;color:var(--green);font-family:var(--mono);font-weight:500}
#tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:8px 4px 7px;text-align:center;cursor:pointer;font-size:9px;color:var(--muted);font-family:var(--mono);font-weight:500;border-bottom:2px solid transparent;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px;letter-spacing:.3px}
.tab .ti2{font-size:17px}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#content{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch;padding-top:4px}
.panel.active{display:block}
#mp{overflow:hidden;display:none;flex-direction:column}
#mp.active{display:flex}
#map{flex:1;min-height:0}
#map-controls{position:absolute;bottom:16px;left:12px;z-index:500;display:flex;flex-direction:column;gap:6px}
.map-toggle{background:rgba(13,27,42,.9);border:1px solid var(--border);border-radius:10px;padding:7px 12px;font-size:11px;font-family:var(--mono);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:7px;color:var(--muted);transition:all .2s;white-space:nowrap;backdrop-filter:blur(4px)}
.map-toggle.on{color:var(--text);border-color:rgba(56,189,248,.5)}
.map-toggle .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;opacity:.5;transition:opacity .2s}
.map-toggle.on .dot{opacity:1}
.dot-camp{background:var(--accent)}.dot-attr{background:var(--amber)}.dot-wind{background:#a78bfa}.dot-roads{background:var(--green)}
/* Wind banner */
.wind-banner{margin:8px 12px 0;border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;border:1px solid}
.wind-banner.ok{background:#081a10;border-color:var(--green);color:var(--green)}
.wind-banner.caution{background:#1a180a;border-color:var(--yellow);color:var(--yellow)}
.wind-banner.warning{background:#1a100a;border-color:var(--amber);color:var(--amber)}
.wind-banner.danger{background:#1a0808;border-color:var(--red);color:var(--red)}
.wind-banner.unknown{background:var(--bg3);border-color:var(--border);color:var(--muted)}
.wb-icon{font-size:20px;flex-shrink:0}
.wb-text{flex:1}.wb-title{font-size:12px;font-weight:600}.wb-sub{font-size:10px;font-family:var(--mono);opacity:.8;margin-top:1px}
.wb-time{font-size:9px;font-family:var(--mono);opacity:.5;margin-left:auto;white-space:nowrap}
/* Wind station cards */
.wstation{margin:0 12px 8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;display:flex;align-items:center;gap:12px}
.ws-region{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.ws-name{font-size:13px;font-weight:600;margin:2px 0}
.ws-wind{text-align:right;flex-shrink:0}
.ws-speed{font-size:18px;font-weight:700;font-family:var(--mono)}
.ws-dir{font-size:10px;font-family:var(--mono);color:var(--muted)}
.ws-label{font-size:9px;font-family:var(--mono);margin-top:2px}
.ws-ok{color:var(--green)}.ws-caution{color:var(--yellow)}.ws-warning{color:var(--amber)}.ws-danger{color:var(--red)}.ws-unknown{color:var(--muted)}
.ws-camper{display:inline-block;font-size:9px;font-family:var(--mono);background:#1a100a;color:var(--amber);border:1px solid #3a2010;border-radius:6px;padding:1px 6px;margin-top:3px}
/* Live roads */
.roads-live-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono);color:var(--green);margin:0 12px 8px}
.roads-live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:lp 2s infinite;flex-shrink:0}
.route-row{margin:0 12px 8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;display:flex;align-items:center;gap:10px}
.route-name{flex:1;font-size:13px;font-weight:600}.route-cond{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
/* Closures */
.closure-item{margin:0 12px 6px;background:#1a0808;border:1px solid #3a1010;border-radius:var(--r);padding:10px 14px}
.closure-road{font-size:12px;font-weight:600;color:var(--red);margin-bottom:3px}
.closure-detail{font-size:11px;color:var(--muted);font-family:var(--mono)}
/* Fallback notice */
.data-fallback{margin:0 12px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;font-size:11px;color:var(--muted);font-family:var(--mono);text-align:center}
.leaflet-popup-content-wrapper{background:var(--bg2)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:14px!important;box-shadow:0 8px 32px rgba(0,0,0,.7)!important}
.leaflet-popup-tip{background:var(--bg2)!important}
.leaflet-popup-content{margin:12px 14px!important;font-family:var(--font)!important;min-width:190px}
.pn{font-size:13px;font-weight:700;margin-bottom:3px}
.pm{font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:6px}
.pw{font-size:13px;display:flex;align-items:center;gap:6px;margin-bottom:4px}
.pp{font-size:11px;color:var(--accent);font-family:var(--mono)}
.prb{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);font-weight:600;padding:3px 9px;border-radius:8px;margin-top:6px}
.ro{background:#0a2a14;color:var(--green)}.rc{background:#2a200a;color:var(--yellow)}.rk{background:#0a1e30;color:var(--accent)}
.attr-typebadge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono);font-weight:600;padding:3px 9px;border-radius:8px;margin-bottom:7px}
.at-waterfall{background:#0a1e36;color:#7dd3fc}.at-glacier{background:#0e1e2e;color:#bfdbfe}
.at-beach{background:#1a1208;color:#fcd34d}.at-geo{background:#1a0e08;color:#fdba74}
.at-lagoon{background:#081e1e;color:#5eead4}.at-historic{background:#1a0e1a;color:#d8b4fe}
.at-hike{background:#0a1e10;color:#86efac}.at-nature{background:#0e180a;color:#bbf7d0}
.sh{padding:12px 16px 6px;font-size:10px;font-family:var(--mono);color:var(--muted);font-weight:500;letter-spacing:1px;text-transform:uppercase}
.dc{margin:0 12px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s}
.dc:active{border-color:var(--accent)}
.dh{padding:12px 14px;display:flex;align-items:center;gap:10px}
.dn{width:34px;height:34px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:var(--mono);color:var(--accent);flex-shrink:0}
.dn.past{color:var(--muted);background:var(--bg2)}.dn.today{background:var(--accent);color:var(--bg)}
.di{flex:1;min-width:0}.dd{font-size:10px;font-family:var(--mono);color:var(--muted)}
.dc-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dr{font-size:11px;color:var(--muted)}
.dw{text-align:right;flex-shrink:0}
.wt{font-size:19px;font-weight:300;font-family:var(--mono)}.wi{font-size:19px}
.db{padding:0 14px 12px;display:none}.db.open{display:block}
.divr{border:none;border-top:1px solid var(--border);margin-bottom:10px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{font-size:10px;font-family:var(--mono);font-weight:500;padding:3px 9px;border-radius:10px}
.cp{background:#081e30;color:var(--accent);border:1px solid #143550}
.cd{background:#101e0a;color:#86efac;border:1px solid #1a3a10}
.cw{background:#1a180a;color:var(--yellow);border:1px solid #3a3010}
.co{background:#081e14;color:var(--green);border:1px solid #103a20}
.aurora{background:linear-gradient(135deg,#0d0020,#1a0035,#2a0860,#1a0035,#0d0020);border-radius:10px;padding:8px 12px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.al{font-size:11px;font-family:var(--mono);color:#c084fc}.as{letter-spacing:3px;font-size:13px}
.sl{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.si{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--muted)}
.si::before{content:'→';color:var(--accent);flex-shrink:0}
.snn{font-size:11px;color:var(--muted);font-style:italic;margin-top:4px;padding-left:14px}
.attr-card{margin:0 12px 8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.attr-card-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.attr-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.attr-name{font-size:13px;font-weight:600}.attr-sub{font-size:11px;color:var(--muted)}
.attr-desc{font-size:12px;color:var(--muted);line-height:1.55}
.attr-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:8px;font-weight:500}
.tag-day{background:#081e30;color:var(--accent);border:1px solid #143550}
.tag-time{background:#0a1a10;color:#86efac;border:1px solid #1a3a10}
.tag-must{background:#16082e;color:var(--purple);border:1px solid #2a1450}
.wloc{margin:0 12px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.wlh{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.wln{font-size:13px;font-weight:600}.wlr{font-size:11px;color:var(--muted)}.wlni{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}
.fscroll{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;scrollbar-width:none}
.fscroll::-webkit-scrollbar{display:none}
.fday{flex-shrink:0;width:54px;text-align:center;padding:8px 4px;background:var(--bg3);border-radius:10px}
.fday.camp{background:#0a2a3a;border:1px solid #1a5070}
.fdow{font-size:9px;font-family:var(--mono);color:var(--muted);margin-bottom:3px;text-transform:uppercase}
.fday.camp .fdow{color:var(--accent)}
.fic{font-size:20px;margin-bottom:3px}
.fhi{font-size:14px;font-weight:700;font-family:var(--mono)}.flo{font-size:10px;color:var(--muted);font-family:var(--mono)}
.fday.camp .flo{color:#7dd3fc}
.fwd{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.ralert{margin:0 12px 10px;border-radius:var(--r);padding:12px 14px;display:flex;gap:10px;border-left:3px solid}
.ralert.green{background:#081a10;border-color:var(--green)}.ralert.yellow{background:#1a1504;border-color:var(--yellow)}
.rai{font-size:20px;flex-shrink:0}.rat{font-size:13px;font-weight:600;margin-bottom:3px}.rab{font-size:12px;color:var(--muted);line-height:1.5}
.seg{margin:0 12px 8px}
.segrow{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;display:flex;align-items:center;gap:10px}
.sname{flex:1}.sn1{font-size:12px;font-weight:500}.sn2{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.sbadge{font-size:10px;font-family:var(--mono);font-weight:600;padding:4px 10px;border-radius:9px;flex-shrink:0}
.so{background:#081e14;color:var(--green)}.sc{background:#1a1504;color:var(--yellow)}.sk{background:#081422;color:var(--accent)}
.elinks{margin:0 12px 16px;display:flex;flex-direction:column;gap:8px}
.elink{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--text);cursor:pointer}
.elink:active{background:var(--bg2)}
.eli{font-size:22px}.elt .elt1{font-size:13px;font-weight:600}.elt .elt2{font-size:11px;color:var(--muted)}.ela{margin-left:auto;color:var(--muted);font-size:20px;font-weight:300}
.cm{width:30px;height:30px;border-radius:50%;background:var(--accent);border:2.5px solid white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--mono);color:#0d1b2a;box-shadow:0 2px 12px rgba(0,0,0,.5);cursor:pointer}
.cm.today{background:var(--green);box-shadow:0 0 0 4px rgba(34,197,94,.25),0 2px 12px rgba(0,0,0,.5)}
.cm.past{background:#1e3550;border-color:#334a66;color:var(--muted)}
.am{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 10px rgba(0,0,0,.5);cursor:pointer}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.bp{height:calc(24px + env(safe-area-inset-bottom,0px))}
</style>
</head>
<body>

<div id="loading">
  <div class="ll">🧊</div>
  <div class="lt">Iceland Travel Map</div>
  <div class="ls">Ring Road · Live Roads &amp; Weather</div>
  <div class="lb"><div class="lf" id="lf"></div></div>
  <div class="ls" id="lstatus">Loading live data…</div>
</div>

<div id="app" style="display:none">
  <div id="topbar">
    <div class="ti">🧊</div>
    <div class="tt"><h1>Iceland Travel Map</h1><p id="topbar-sub">Ring Road · Live Data</p></div>
    <div class="sp"></div>
    <div class="ld" id="live-dot"></div>&nbsp;<div class="lv" id="live-label">LIVE</div>
  </div>
  <div id="tabs">
    <div class="tab active" data-p="mp"><span class="ti2">🗺</span>MAP</div>
    <div class="tab" data-p="ip"><span class="ti2">⛺</span>CAMPSITES</div>
    <div class="tab" data-p="ap"><span class="ti2">🏔</span>SIGHTS</div>
    <div class="tab" data-p="wp"><span class="ti2">🌦</span>WEATHER</div>
    <div class="tab" data-p="rp"><span class="ti2">🚧</span>ROADS</div>
  </div>
  <div id="content">
    <div id="mp" class="panel active">
      <div id="map"></div>
      <div id="map-controls">
        <div class="map-toggle on" id="tog-camp" onclick="toggleLayer('camp')">
          <div class="dot dot-camp"></div>Campsites
        </div>
        <div class="map-toggle on" id="tog-attr" onclick="toggleLayer('attr')">
          <div class="dot dot-attr"></div>Sights
        </div>
        <div class="map-toggle" id="tog-wind" onclick="toggleLayer('wind')">
          <div class="dot dot-wind"></div>Wind
        </div>
      </div>
    </div>
    <div id="ip" class="panel"><div id="ilist"></div><div class="bp"></div></div>
    <div id="ap" class="panel"><div id="alist"></div><div class="bp"></div></div>
    <div id="wp" class="panel"><div id="wlist"></div><div class="bp"></div></div>
    <div id="rp" class="panel"><div id="rcontent"></div><div class="bp"></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script>
const SITES=[
  {id:'hellisholar',name:'Hellishólar',region:'South Iceland',n:1,date:'Mar 24',dstr:'2026-03-24',lat:63.7253,lon:-20.0384,price:'~6,300 kr/p',km:180,from:'Keflavík (2h)',sights:['Seljalandsfoss — walk behind the waterfall','Skógafoss waterfall','Eyjafjallajökull views'],note:'25-year age minimum. Restaurant on site.',aurora:2,seg:'s1'},
  {id:'fossardalur',name:'Fossárdalur',region:'East Fjords',n:2,date:'Mar 25',dstr:'2026-03-25',lat:64.7558,lon:-14.4986,price:'~3,900 kr/p',km:430,from:'Hellishólar (5.5h)',sights:['Reynisfjara black beach','Jökulsárlón glacier lagoon','Diamond Beach'],note:'Rated 4.8★ — one of Iceland\'s best.',aurora:5,seg:'s2'},
  {id:'bakkafjordur',name:'Bakkafjörður',region:'Far Northeast',n:3,date:'Mar 26',dstr:'2026-03-26',lat:66.0369,lon:-14.8029,price:'~3,000 kr/p',km:220,from:'Fossárdalur (3.5h)',sights:['East Fjords coastal road','Djúpivogur eggs','Digranes hike'],note:'Very remote and quiet.',aurora:5,seg:'s3'},
  {id:'cja',name:'CJA Camping, Laugar',region:'North Iceland',n:4,date:'Mar 27',dstr:'2026-03-27',lat:65.7017,lon:-17.3498,price:'~3,200 kr/p',km:260,from:'Bakkafjörður (3.5h via Dettifoss)',sights:['Dettifoss waterfall','Lake Mývatn area','Laugar geothermal pool'],note:'Private hedged pitches. Legendary hosts.',aurora:5,seg:'s4'},
  {id:'bakkaflot',name:'Bakkaflöt',region:'North · Skagafjörður',n:5,date:'Mar 28',dstr:'2026-03-28',lat:65.4633,lon:-19.3461,price:'~3,400 kr/p',km:150,from:'CJA Laugar (2h via Goðafoss)',sights:['Goðafoss waterfall','Hofsós infinity pool','Glaumbaer turf farm'],note:'Riverside. Hot tubs extra.',aurora:4,seg:'s5'},
  {id:'snorrastadir',name:'Snorrastaðir',region:'West Iceland',n:6,date:'Mar 29',dstr:'2026-03-29',lat:64.7736,lon:-22.3012,price:'~3,800 kr/p',km:220,from:'Bakkaflöt (3h)',sights:['Borgarnes Settlement Centre','Eldborg crater walk at camp','Baby goats'],note:'Open all year. Great aurora spot.',aurora:4,seg:'s6'},
  {id:'grundarfjordur',name:'Grundarfjörður',region:'Snæfellsnes',n:7,date:'Mar 30',dstr:'2026-03-30',lat:64.9206,lon:-23.2582,price:'~2,600 kr/p',km:100,from:'Snorrastaðir (1.5h)',sights:['Snæfellsjökull glacier','Arnarstapi sea cliffs','Kirkjufell at camp'],note:'Cheapest on route. Winter mode.',aurora:3,seg:'s7'},
  {id:'hellisholar2',name:'Hellishólar (night 8)',region:'South Iceland',n:8,date:'Mar 31',dstr:'2026-03-31',lat:63.7253,lon:-20.0384,price:'~6,300 kr/p',km:280,from:'Grundarfjörður (3.5h via Golden Circle)',sights:['Þingvellir National Park','Geysir eruptions','Gullfoss waterfall'],note:'Last night. 90 min to airport.',aurora:2,seg:'s8'},

function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function isToday(s){return s.dstr===today()}
function isPast(s){return s.dstr<today()}
function stars(n){return'★'.repeat(n)+'☆'.repeat(5-n)}
function wdir(d){return['N','NE','E','SE','S','SW','W','NW'][Math.round(d/45)%8]}
function sclass(s){return{open:'so',caution:'sc',check:'sk'}[s]}
function slabel(s){return{open:'✓ OPEN',caution:'⚠ CAUTION',check:'🔍 CHECK'}[s]}
function prclass(s){return{open:'ro',caution:'rc',check:'rk'}[s]}

async function fetchWx(s){
  const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max,winddirection_10m_dominant&wind_speed_unit=ms&timezone=Atlantic/Reykjavik&forecast_days=16`);
  return(await r.json()).daily;
}
async function loadWx(cb){
  const u=SITES.filter((s,i,a)=>a.findIndex(x=>x.id===s.id)===i);
  for(let i=0;i<u.length;i++){
    try{const d=await fetchWx(u[i]);wx[u[i].id]=d;if(u[i].id==='hellisholar')wx['hellisholar2']=d;}catch(e){}
    cb(Math.round((i+1)/u.length*80));
  }
}
function wxForDate(id,dstr){
  const d=wx[id];if(!d)return null;
  const i=d.time.indexOf(dstr);if(i<0)return null;
  return{code:d.weathercode[i],hi:Math.round(d.temperature_2m_max[i]),lo:Math.round(d.temperature_2m_min[i]),wind:Math.round(d.windspeed_10m_max[i]),dir:wdir(d.winddirection_10m_dominant?.[i]??0)};
}

function initMap(){
  mapInst=L.map('map',{zoomControl:false,attributionControl:false}).setView([65,-18.5],6);

  // Base dark map
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(mapInst);

  // Road overlay - ESRI Reference/Boundaries overlay (transparent background, roads+labels only)
  // Free, no auth, designed to be overlaid on any basemap
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}',{
    maxZoom:19,
    opacity:0.4,
    attribution:'Roads © ESRI'
  }).addTo(mapInst);

  L.control.zoom({position:'topright'}).addTo(mapInst);
  // Removed: trip route polyline (personal trip specific)

  campGroup=L.layerGroup().addTo(mapInst);
  SITES.forEach(site=>{
    if(site.id==='hellisholar2')return;
    const cls=isToday(site)?'today':isPast(site)?'past':'';
    const m=L.marker([site.lat,site.lon],{icon:L.divIcon({html:`<div class="cm ${cls}">${site.n}</div>`,iconSize:[30,30],iconAnchor:[15,15],className:''})}).addTo(campGroup);
    // Fix: bind popup once, open on click (not re-bind each time which breaks re-clicking)
    const w=wxForDate(site.id,site.dstr),seg=SEGS[site.seg];
    const wxh=w?`<div class="pw">${WXI[w.code]||'❓'} <b>${w.hi}°/${w.lo}°</b> · ${w.wind}m/s ${w.dir}</div>`:'<div class="pw" style="color:var(--muted)">–</div>';
    m.bindPopup(`<div class="pn">Night ${site.n} — ${site.name}</div><div class="pm">${site.date} · ${site.region}</div>${wxh}<div class="pp">${site.price} incl. elec+tax</div><div class="prb ${prclass(seg.status)}">${slabel(seg.status)}</div><div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:4px">${seg.note}</div>`,{maxWidth:260});
  });

  attrGroup=L.layerGroup().addTo(mapInst);
  ATTRS.forEach(a=>{
    const bg=ATTR_COLORS[a.type]||'#f97316';
    const m=L.marker([a.lat,a.lon],{icon:L.divIcon({html:`<div class="am" style="background:${bg}28;border:2px solid ${bg}77">${a.icon}</div>`,iconSize:[28,28],iconAnchor:[14,14],className:''})}).addTo(attrGroup);
    // Fix: bind popup once upfront
    m.bindPopup(`<div class="pn">${a.icon} ${a.name}</div><div class="attr-typebadge ${a.typeClass}">${a.typeLabel}</div><div style="font-size:12px;color:var(--muted);line-height:1.55">${a.desc}</div><div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:7px">📅 ${a.day}&nbsp;&nbsp;⏱ ${a.time}${a.must?'&nbsp;&nbsp;⭐ Must-see':''}</div>`,{maxWidth:275});
  });
}

function toggleLayer(w){
  layerState[w]=!layerState[w];
  document.getElementById('tog-'+w).classList.toggle('on',layerState[w]);
  if(w==='camp'){layerState.camp?campGroup.addTo(mapInst):mapInst.removeLayer(campGroup);}
  else if(w==='attr'){layerState.attr?attrGroup.addTo(mapInst):mapInst.removeLayer(attrGroup);}
  else if(w==='wind'){
    if(layerState.wind){if(windGroup)windGroup.addTo(mapInst);}
    else{if(windGroup)mapInst.removeLayer(windGroup);}
  }
}

async function fetchLiveRoads(){
  try{
    const r=await fetch('/api/roads',{signal:AbortSignal.timeout(10000)});
    if(!r.ok)throw new Error('roads api error');
    liveRoads=await r.json();
  }catch(e){
    liveRoads={ok:false,fallback:true,routes:[],activeClosures:[],fRoads:{open:false,label:'Check road.is',severity:'check'}};
  }
}

async function fetchLiveWind(){
  try{
    const r=await fetch('/api/weather',{signal:AbortSignal.timeout(10000)});
    if(!r.ok)throw new Error('weather api error');
    liveWind=await r.json();
  }catch(e){
    liveWind={ok:false,fallback:true,stations:[],alert:{level:'unknown',campervanWarning:false,warningAreas:[],message:'Check vedur.is for conditions.'}};
  }
}

// ── Wind map layer ─────────────────────────────────────────────────

function buildWindLayer(){
  if(!mapInst||!liveWind||!liveWind.stations)return;
  if(windGroup)mapInst.removeLayer(windGroup);
  windGroup=L.layerGroup();

  const SEV_COLORS={ok:'#22c55e',caution:'#f59e0b',warning:'#f97316',danger:'#ef4444',unknown:'#557a99'};

  liveWind.stations.forEach(st=>{
    if(!st.lat||!st.lon)return;
    const sev=st.wind.severity||'unknown';
    const col=SEV_COLORS[sev]||'#557a99';
    const ms=st.wind.speedMs!==null?st.wind.speedMs.toFixed(1):'?';
    const dir=st.wind.directionLabel||'–';

    // Arrow icon showing wind direction
    const arrowDeg=(st.wind.directionDeg||0)+180; // arrow points where wind goes TO
    const icon=L.divIcon({
      html:`<div style="width:36px;height:36px;border-radius:50%;background:${col}22;border:2px solid ${col}99;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-family:var(--mono)">
        <div style="font-size:9px;font-weight:700;color:${col};line-height:1">${ms}</div>
        <div style="font-size:7px;color:${col};opacity:.8">m/s</div>
        <div style="font-size:8px;color:${col};opacity:.7">${dir}</div>
      </div>`,
      iconSize:[36,36],iconAnchor:[18,18],className:''
    });

    const m=L.marker([st.lat,st.lon],{icon}).addTo(windGroup);
    const warn=st.wind.campervanWarning?'<div style="font-size:10px;background:#1a100a;color:var(--amber);border:1px solid #3a2010;border-radius:6px;padding:2px 8px;margin-top:6px;font-family:var(--mono)">⚠ Campervan caution</div>':'';
    const popupHtml=`
      <div class="pn">${st.name}</div>
      <div class="pm">${st.region}</div>
      <div style="font-size:13px;margin:6px 0;font-family:var(--mono)">
        💨 ${ms} m/s ${dir}${st.wind.gustMs?` · gust ${st.wind.gustMs.toFixed(1)}`:''}<br>
        <span style="color:${col};font-size:11px">${st.wind.label||''}</span>
      </div>
      ${st.temperature!==null?`<div style="font-size:12px;color:var(--muted)">🌡 ${st.temperature}°C</div>`:''}
      ${warn}
      <div style="font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:6px">vedur.is · ${st.observedAt||'recent'}</div>
    `;
    m.bindPopup(popupHtml,{maxWidth:230});
  });

  if(layerState.wind)windGroup.addTo(mapInst);
}

  // Active alerts from safetravel.is

    <div class="rai">${fr.severity==='open'?'✅':'⛔'}</div>

  </div>`;
  c.appendChild(frEl);

  // Links
  const lh=document.createElement('div');lh.innerHTML='<div class="sh" style="margin-top:4px">CHECK EVERY MORNING</div>';c.appendChild(lh);
  const ld=document.createElement('div');ld.className='elinks';
  [{i:'🛟',t:'safetravel.is',s:'Active alerts & travel warnings',u:'https://safetravel.is/travel-conditions/'},
   {i:'🗺',t:'road.is',s:'Official road closures (Vegagerðin)',u:'https://www.road.is'},
   {i:'⛅',t:'vedur.is',s:'Icelandic Met Office — wind & forecasts',u:'https://en.vedur.is'},
   {i:'📱',t:'112 Iceland App',s:'Emergency registration — download now',u:'https://www.safetravel.is/112-iceland-app'}
  ].forEach(l=>{
    const a=document.createElement('a');a.className='elink';a.href=l.u;a.target='_blank';a.rel='noopener';
    a.innerHTML=`<div class="eli">${l.i}</div><div class="elt"><div class="elt1">${l.t}</div><div class="elt2">${l.s}</div></div><div class="ela">›</div>`;
    ld.appendChild(a);
  });
  c.appendChild(ld);
}

// ── Updated buildWeather with live wind banner ─────────────────────

function buildWeatherTab(){
  const c=document.getElementById('wlist');c.innerHTML='';

  // Wind alert banner at top
  if(liveWind){
    const al=liveWind.alert||{};
    const sev=al.level||'unknown';
    const sevIcon={ok:'🌬',caution:'💨',warning:'⚠️',danger:'🚨',unknown:'❓'}[sev]||'❓';
    const banner=document.createElement('div');
    const t=liveWind.fetchedAt?new Date(liveWind.fetchedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'';
    banner.innerHTML=`<div class="wind-banner ${sev}">
      <div class="wb-icon">${sevIcon}</div>
      <div class="wb-text">
        <div class="wb-title">${al.campervanWarning?'Campervan wind warning active':'Wind conditions '+sev}</div>
        <div class="wb-sub">${al.message||''}</div>
      </div>
      ${t?`<div class="wb-time">vedur.is<br>${t}</div>`:''}
    </div>`;
    c.appendChild(banner);

    // Wind stations
    if(liveWind.stations&&liveWind.stations.length>0){
      const sh=document.createElement('div');sh.className='sh';sh.style.paddingTop='12px';sh.textContent='WIND STATIONS';c.appendChild(sh);
      const SEV_CLASS={ok:'ws-ok',caution:'ws-caution',warning:'ws-warning',danger:'ws-danger',unknown:'ws-unknown'};
      liveWind.stations.forEach(st=>{
        if(st.wind.speedMs===null&&st.temperature===null)return;
        const el=document.createElement('div');el.className='wstation';
        const sc2=SEV_CLASS[st.wind.severity]||'ws-unknown';
        const ms=st.wind.speedMs!==null?st.wind.speedMs.toFixed(1):'?';
        el.innerHTML=`
          <div style="flex:1">
            <div class="ws-region">${st.region}</div>
            <div class="ws-name">${st.name}</div>
            ${st.temperature!==null?`<div style="font-size:11px;color:var(--muted);font-family:var(--mono)">🌡 ${st.temperature}°C</div>`:''}
            ${st.wind.campervanWarning?'<div class="ws-camper">⚠ Campervan caution</div>':''}
          </div>
          <div class="ws-wind">
            <div class="ws-speed ${sc2}">${ms}<span style="font-size:10px"> m/s</span></div>
            <div class="ws-dir">${st.wind.directionLabel||'–'}</div>
            <div class="ws-label ${sc2}">${st.wind.label||''}</div>
          </div>`;
        c.appendChild(el);
      });
    }
  }

  // 7-day forecast per campsite location
  const sh2=document.createElement('div');sh2.className='sh';sh2.style.paddingTop='14px';
  sh2.innerHTML='9-DAY FORECAST BY LOCATION <span style="font-size:9px;font-weight:400;color:var(--muted)">· max°/min° · wind m/s · source: Open-Meteo</span>';
  c.appendChild(sh2);
  const seen=new Set();
  SITES.forEach(site=>{
    if(seen.has(site.id))return;seen.add(site.id);
    const d=wx[site.id];if(!d)return;
    const days=d.time.slice(0,9).map((dt,i)=>{
      const dow=new Date(dt+'T12:00').toLocaleDateString('en-US',{weekday:'short'}).slice(0,3).toUpperCase();
      const isToday2=dt===today();
      return`<div class="fday${isToday2?' camp':''}"><div class="fdow">${isToday2?'TODAY':dow}</div><div class="fic">${WXI[d.weathercode[i]]||'❓'}</div><div class="fhi">${Math.round(d.temperature_2m_max[i])}°</div><div class="flo">${Math.round(d.temperature_2m_min[i])}°</div><div class="fwd">${Math.round(d.windspeed_10m_max[i])}m/s</div></div>`;
    }).join('');
    const el=document.createElement('div');el.className='wloc';
    el.innerHTML=`<div class="wlh"><div><div class="wln">${site.name}</div><div class="wlr">${site.region}</div></div></div><div class="fscroll">${days}</div>`;
    c.appendChild(el);
  });
}

async function init(){
  const lf=document.getElementById('lf'),ls=document.getElementById('lstatus');
  lf.style.width='5%';ls.textContent='Fetching live weather forecasts…';
  await loadWx(p=>{lf.style.width=(p*0.6)+'%'});
  lf.style.width='65%';ls.textContent='Loading road conditions…';
  await fetchLiveRoads();
  lf.style.width='80%';ls.textContent='Loading wind data…';
  await fetchLiveWind();
  lf.style.width='95%';ls.textContent='Building map…';
  await new Promise(r=>setTimeout(r,150));
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  initMap();
  buildWindLayer();
  buildRoute();buildAttractions();buildWeatherTab();buildRoads();
}
init();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Iceland Trip" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Iceland Ring Road</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* ============================================================
       TOKENS & RESET
    ============================================================ */
    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #21262d;
      --border:      #30363d;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --accent:      #58a6ff;
      --accent-dim:  rgba(88,166,255,.15);
      --green:       #3fb950;
      --yellow:      #d29922;
      --red:         #f85149;
      --orange:      #e3622e;

      --nav-h:       64px;
      --status-h:    48px;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bot:    env(safe-area-inset-bottom, 0px);
      --safe-left:   env(safe-area-inset-left, 0px);
      --safe-right:  env(safe-area-inset-right, 0px);
      --radius:      12px;
      --radius-sm:   8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; }
    a { color: var(--accent); text-decoration: none; }

    /* ============================================================
       LAYOUT SHELL
    ============================================================ */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
    }

    /* ---- Status Bar ---- */
    #status-bar {
      flex-shrink: 0;
      height: var(--status-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      font-size: 13px;
      overflow: hidden;
    }
    #status-bar .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      white-space: nowrap;
      font-size: 12px;
      font-weight: 500;
    }
    #status-bar .status-pill .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
    }
    #status-bar .status-pill .dot.warn { background: var(--yellow); }
    #status-bar .status-pill .dot.danger { background: var(--red); }
    #status-bar .status-sep { color: var(--border); }
    #status-bar .status-time { color: var(--text-muted); margin-left: auto; font-size: 11px; }

    /* ---- Content Area ---- */
    #content {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    .tab-panel {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .tab-panel.active {
      display: flex;
    }

    /* ---- Bottom Nav ---- */
    #bottom-nav {
      flex-shrink: 0;
      height: var(--nav-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 4px;
      border-radius: 0;
      transition: background .15s, color .15s;
      color: var(--text-muted);
      position: relative;
    }
    .nav-btn.active {
      color: var(--accent);
    }
    .nav-btn.active::after {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 2px;
      background: var(--accent);
      border-radius: 0 0 2px 2px;
    }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn span { font-size: 10px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; }

    /* ============================================================
       SCROLLABLE LIST PANELS
    ============================================================ */
    .panel-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    .panel-scroll::-webkit-scrollbar { width: 3px; }
    .panel-scroll::-webkit-scrollbar-track { background: transparent; }
    .panel-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .panel-header {
      padding: 16px 16px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    /* ---- Cards ---- */
    .card {
      margin: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .15s;
    }
    .card:active { border-color: var(--accent); }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 14px;
    }
    .card-icon {
      width: 40px; height: 40px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .card-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      flex-shrink: 0;
      align-self: flex-start;
    }
    .badge-green  { background: rgba(63,185,80,.15);  color: var(--green); }
    .badge-yellow { background: rgba(210,153,34,.15); color: var(--yellow); }
    .badge-red    { background: rgba(248,81,73,.15);  color: var(--red); }
    .badge-blue   { background: var(--accent-dim);    color: var(--accent); }

    .card-actions {
      display: flex;
      border-top: 1px solid var(--border);
    }
    .card-action-btn {
      flex: 1;
      padding: 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-align: center;
      transition: background .15s;
    }
    .card-action-btn:active { background: var(--accent-dim); }
    .card-action-btn + .card-action-btn { border-left: 1px solid var(--border); }

    /* ============================================================
       MAP TAB
    ============================================================ */
    #map-panel { position: relative; }

    #map {
      flex: 1;
      min-height: 0;
    }

    /* Floating controls */
    .map-fab-group {
      position: absolute;
      right: 14px;
      bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
    }
    .map-fab {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
      transition: background .15s, transform .1s;
    }
    .map-fab:active { transform: scale(.92); background: var(--surface2); }
    .map-fab svg { width: 20px; height: 20px; }

    .map-layer-toggle {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 1000;
      display: flex;
      gap: 6px;
    }
    .layer-btn {
      padding: 8px 12px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
      transition: all .15s;
    }
    .layer-btn.on {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Bottom sheet for map popups */
    #map-sheet {
      position: absolute;
      bottom: -100%;
      left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      z-index: 2000;
      transition: bottom .3s cubic-bezier(.4,0,.2,1);
      padding-bottom: 8px;
      box-shadow: 0 -8px 32px rgba(0,0,0,.5);
    }
    #map-sheet.open { bottom: 0; }
    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px auto 14px;
    }
    .sheet-content { padding: 0 16px 16px; }
    .sheet-title { font-size: 17px; font-weight: 700; }
    .sheet-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .sheet-actions { display: flex; gap: 8px; margin-top: 14px; }
    .sheet-btn {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      transition: opacity .15s;
    }
    .sheet-btn:active { opacity: .7; }
    .sheet-btn-primary { background: var(--accent); color: #0d1117; }
    .sheet-btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    /* Leaflet overrides for dark */
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      box-shadow: 0 8px 24px rgba(0,0,0,.5) !important;
    }
    .leaflet-container { font-family: inherit !important; }

    /* ============================================================
       WEATHER TAB
    ============================================================ */
    .weather-hero {
      padding: 20px 16px;
      background: linear-gradient(135deg, #0d1b2a 0%, #162032 100%);
      border-bottom: 1px solid var(--border);
    }
    .weather-station-selector {
      display: flex;
      gap: 8px;
      padding: 12px 12px 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .weather-station-selector::-webkit-scrollbar { display: none; }
    .station-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      transition: all .15s;
    }
    .station-chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .weather-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px;
    }
    .weather-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .weather-stat-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .weather-stat-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .weather-stat-unit {
      font-size: 13px;
      color: var(--text-muted);
      margin-left: 3px;
    }

    /* wind color values */
    .wind-calm   { color: var(--green); }
    .wind-mod    { color: var(--yellow); }
    .wind-strong { color: var(--orange); }
    .wind-storm  { color: var(--red); }

    /* ============================================================
       ROADS TAB
    ============================================================ */
    .alert-banner {
      margin: 8px 12px;
      padding: 14px;
      border-radius: var(--radius);
      border-left: 3px solid;
      background: var(--surface);
      border-color: var(--border);
    }
    .alert-banner.closed  { border-color: var(--red);    background: rgba(248,81,73,.08); }
    .alert-banner.warning { border-color: var(--yellow); background: rgba(210,153,34,.08); }
    .alert-banner.info    { border-color: var(--accent); background: var(--accent-dim); }
    .alert-title { font-size: 14px; font-weight: 600; }
    .alert-desc  { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }
    .alert-meta  { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

    /* ============================================================
       PULL-TO-REFRESH
    ============================================================ */
    .ptr-spinner {
      text-align: center;
      padding: 12px;
      color: var(--text-muted);
      font-size: 12px;
      display: none;
    }
    .ptr-spinner.visible { display: block; }

    /* ============================================================
       LOADING / ERROR STATES
    ============================================================ */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }

    /* ============================================================
       INSTALL BANNER
    ============================================================ */
    #install-banner {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-bot) + 8px);
      left: 12px; right: 12px;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      z-index: 9999;
      transform: translateY(calc(100% + 80px));
      transition: transform .4s cubic-bezier(.4,0,.2,1);
    }
    #install-banner.show { transform: translateY(0); }
    #install-banner .icon { font-size: 28px; flex-shrink: 0; }
    #install-banner .text { flex: 1; min-width: 0; }
    #install-banner .text strong { display: block; font-size: 14px; }
    #install-banner .text small { font-size: 12px; color: var(--text-muted); }
    #install-btn {
      padding: 8px 14px;
      background: var(--accent);
      color: #0d1117;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }
    #install-dismiss {
      padding: 8px;
      color: var(--text-muted);
      font-size: 20px;
      line-height: 1;
    }

    /* ============================================================
       OFFLINE TOAST
    ============================================================ */
    #offline-toast {
      position: fixed;
      top: calc(var(--safe-top) + var(--status-h) + 8px);
      left: 50%; transform: translateX(-50%) translateY(-80px);
      background: var(--yellow);
      color: #0d1117;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 18px;
      border-radius: 20px;
      z-index: 9999;
      transition: transform .3s;
      white-space: nowrap;
    }
    #offline-toast.show { transform: translateX(-50%) translateY(0); }

    /* ============================================================
       RESPONSIVE DESKTOP (secondary)
    ============================================================ */
    @media (min-width: 640px) {
      #bottom-nav { justify-content: center; }
      .nav-btn { max-width: 100px; }
      .weather-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Status Bar -->
  <div id="status-bar">
    <div class="status-pill" id="wind-status">
      <div class="dot" id="wind-dot"></div>
      <span id="wind-label">Wind –</span>
    </div>
    <div class="status-pill" id="road-status">
      <div class="dot" id="road-dot"></div>
      <span id="road-label">Roads –</span>
    </div>
    <div class="status-time" id="last-updated">Updating…</div>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- ===== MAP ===== -->
    <div class="tab-panel active" id="panel-map">
      <div id="map"></div>

      <!-- Layer toggles -->
      <div class="map-layer-toggle">
        <button class="layer-btn on" id="btn-wind-layer" onclick="toggleWindLayer()">💨 Wind</button>
        <button class="layer-btn on" id="btn-road-layer" onclick="toggleRoadLayer()">🛣️ Roads</button>
      </div>

      <!-- FABs -->
      <div class="map-fab-group">
        <button class="map-fab" onclick="locateMe()" title="My location">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/>
            <circle cx="12" cy="12" r="9" stroke-dasharray="4 2"/>
          </svg>
        </button>
        <button class="map-fab" onclick="fitRingRoad()" title="Fit Iceland">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
          </svg>
        </button>
      </div>

      <!-- Bottom Sheet -->
      <div id="map-sheet">
        <div class="sheet-handle" onclick="closeSheet()"></div>
        <div class="sheet-content">
          <div class="sheet-title" id="sheet-title">–</div>
          <div class="sheet-sub" id="sheet-sub">–</div>
          <div class="sheet-actions" id="sheet-actions"></div>
        </div>
      </div>
    </div>

    <!-- ===== CAMPSITES ===== -->
    <div class="tab-panel" id="panel-campsites">
      <div class="panel-header">23 Year-Round Campsites</div>
      <div class="panel-scroll" id="camp-list">
        <div class="loading-state"><div class="spinner"></div>Loading…</div>
      </div>
    </div>

    <!-- ===== SIGHTS ===== -->
    <div class="tab-panel" id="panel-sights">
      <div class="panel-header">17 Curated Attractions</div>
      <div class="panel-scroll" id="sights-list">
        <div class="loading-state"><div class="spinner"></div>Loading…</div>
      </div>
    </div>

    <!-- ===== WEATHER ===== -->
    <div class="tab-panel" id="panel-weather">
      <div class="panel-scroll">
        <div class="weather-station-selector" id="station-chips"></div>
        <div class="weather-grid" id="weather-grid">
          <div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div>Fetching stations…</div>
        </div>
      </div>
    </div>

    <!-- ===== ROADS ===== -->
    <div class="tab-panel" id="panel-roads">
      <div class="panel-header">Live Road Status — safetravel.is</div>
      <div class="panel-scroll" id="roads-list">
        <div class="loading-state"><div class="spinner"></div>Loading alerts…</div>
      </div>
    </div>

  </div><!-- /content -->

  <!-- Bottom Nav -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="map" onclick="switchTab('map',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
        <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
      </svg>
      <span>Map</span>
    </button>
    <button class="nav-btn" data-tab="campsites" onclick="switchTab('campsites',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 20L12 4 2 20h20z"/><line x1="12" y1="4" x2="12" y2="20"/>
      </svg>
      <span>Camps</span>
    </button>
    <button class="nav-btn" data-tab="sights" onclick="switchTab('sights',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4M1 12h4m14 0h4"/>
        <path d="M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M19.78 4.22l-2.83 2.83m-9.9 9.9l-2.83 2.83"/>
      </svg>
      <span>Sights</span>
    </button>
    <button class="nav-btn" data-tab="weather" onclick="switchTab('weather',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/>
      </svg>
      <span>Weather</span>
    </button>
    <button class="nav-btn" data-tab="roads" onclick="switchTab('roads',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v9a2 2 0 01-2 2h-2"/>
        <circle cx="9" cy="17" r="2"/><circle cx="17" cy="17" r="2"/>
      </svg>
      <span>Roads</span>
    </button>
  </nav>

</div><!-- /app -->

<!-- Install Banner -->
<div id="install-banner">
  <div class="icon">🏔️</div>
  <div class="text">
    <strong>Add to Home Screen</strong>
    <small>Offline maps + live alerts</small>
  </div>

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');

  if (id === 'map') setTimeout(() => map && map.invalidateSize(), 100);
}

function initMap() {
  map = L.map('map', {
    center: [65.0, -19.0],
    zoom: 6,
    zoomControl: false,
    attributionControl: false,
  });

  // Dark basemap
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  // Road overlay
  roadLayerGroup = L.layerGroup().addTo(map);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19, opacity: 0.55
  }).addTo(roadLayerGroup);

  // Attribution (small)
  L.control.attribution({ position:'bottomleft', prefix:'' })
    .addAttribution('© CartoDB | ESRI').addTo(map);

  // Zoom control top-right
  L.control.zoom({ position: 'topright' }).addTo(map);

  // Plot campsites
  CAMPSITES.forEach(c => {
    const marker = L.circleMarker([c.lat, c.lng], {
      radius: 7, fillColor: '#3fb950', color: '#0d1117',
      weight: 2, fillOpacity: 1
    }).addTo(map);
    marker.on('click', () => openSheet(c.name, c.type + ' campsite · ' + c.note, [
      { label:'Navigate', url: c.gmaps, primary: true },
      { label:'Route', url: `https://maps.google.com/?q=${c.lat},${c.lng}`, primary: false },
    ]));
  });

  // Plot sights
  SIGHTS.forEach(s => {
    const marker = L.circleMarker([s.lat, s.lng], {
      radius: 7, fillColor: '#58a6ff', color: '#0d1117',
      weight: 2, fillOpacity: 1
    }).addTo(map);
    marker.on('click', () => openSheet(s.emoji + ' ' + s.name, s.cat + ' · ' + s.desc, [
      { label:'Navigate', url: s.gmaps, primary: true },
    ]));
  });

  // Close sheet on map click
  map.on('click', closeSheet);
}

function locateMe() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 10);
    L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
      radius: 9, fillColor: '#58a6ff', color: '#fff', weight: 2, fillOpacity: 1
    }).addTo(map).bindPopup('You are here').openPopup();
  });
}

function renderStationChips() {

async function fetchWeather() {
  try {
    // Use Open-Meteo for each station (free, no key needed)
    const promises = WEATHER_STATIONS.map(s =>
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&current=temperature_2m,wind_speed_10m,wind_gusts_10m,precipitation,weather_code,relative_humidity_2m&wind_speed_unit=ms&timezone=Atlantic%2FReykjavik`)
        .then(r => r.json())
        .then(d => ({ id: s.id, data: d.current }))
    );
    const results = await Promise.allSettled(promises);
    results.forEach(r => {
      if (r.status === 'fulfilled') {
        weatherData[r.value.id] = r.value.data;
      }
    });
    renderWeatherGrid();
    updateStatusBar();
    updateTime();
  } catch(e) {
    console.warn('Weather fetch failed', e);
  }
}

function renderWeatherGrid() {
  const d = weatherData[activeStation];
  if (!d) {
    document.getElementById('weather-grid').innerHTML =
      '<div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div>Loading…</div>';
    return;
  }
  const ws = d.wind_speed_10m;
  const wc = windClass(ws);
  document.getElementById('weather-grid').innerHTML = `
    <div class="weather-stat">
      <div class="weather-stat-label">Temperature</div>
      <div class="weather-stat-value">${Math.round(d.temperature_2m)}<span class="weather-stat-unit">°C</span></div>
    </div>
    <div class="weather-stat">
      <div class="weather-stat-label">Wind Speed</div>
      <div class="weather-stat-value ${wc}">${Math.round(ws)}<span class="weather-stat-unit">m/s</span></div>
    </div>
    <div class="weather-stat">
      <div class="weather-stat-label">Gusts</div>
      <div class="weather-stat-value ${windClass(d.wind_gusts_10m)}">${Math.round(d.wind_gusts_10m)}<span class="weather-stat-unit">m/s</span></div>
    </div>
    <div class="weather-stat">
      <div class="weather-stat-label">Precipitation</div>
      <div class="weather-stat-value">${d.precipitation.toFixed(1)}<span class="weather-stat-unit">mm</span></div>
    </div>
    <div class="weather-stat">
      <div class="weather-stat-label">Humidity</div>
      <div class="weather-stat-value">${d.relative_humidity_2m}<span class="weather-stat-unit">%</span></div>
    </div>
    <div class="weather-stat">
      <div class="weather-stat-label">Condition</div>
      <div class="weather-stat-value" style="font-size:22px">${wmoIcon(d.weather_code)}</div>
    </div>
  `;
  // Update wind markers
  updateWindMarkers();
}

function windClass(ms) {
  if (ms < 8) return 'wind-calm';
  if (ms < 14) return 'wind-mod';
  if (ms < 20) return 'wind-strong';
  return 'wind-storm';
}

function windColor(ms) {
  if (ms < 8) return '#3fb950';
  if (ms < 14) return '#d29922';
  if (ms < 20) return '#e3622e';
  return '#f85149';
}

function wmoIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 3) return '⛅';
  if (code <= 9) return '🌫️';
  if (code <= 29) return '🌧️';
  if (code <= 39) return '🌫️';
  if (code <= 49) return '🌫️';
  if (code <= 59) return '🌧️';
  if (code <= 69) return '❄️';
  if (code <= 79) return '❄️';
  if (code <= 89) return '⛈️';
  if (code <= 99) return '⛈️';
  return '🌡️';
}

function updateWindMarkers() {
  windMarkers.forEach(m => map && map.removeLayer(m));
  windMarkers = [];
  if (!map) return;
  WEATHER_STATIONS.forEach(s => {
    const d = weatherData[s.id];
    if (!d) return;
    const ws = d.wind_speed_10m;
    const color = windColor(ws);
    const m = L.circleMarker([s.lat, s.lng], {
      radius: 10, fillColor: color, color: '#0d1117',
      weight: 1.5, fillOpacity: 0.8
    });
    m.bindTooltip(`${s.name}: ${Math.round(ws)} m/s`, { direction:'top', offset:[0,-8] });
    m.on('click', () => openSheet('💨 ' + s.name, `Wind ${Math.round(ws)} m/s · Gusts ${Math.round(d.wind_gusts_10m)} m/s · ${Math.round(d.temperature_2m)}°C`, []));
    if (windLayerOn) m.addTo(map);
    windMarkers.push(m);
  });
}

/* ================================================================
   ROADS
================================================================ */
async function fetchRoads() {
  try {
    const res = await fetch('/api/roads');
    const text = await res.text();
    parseAndRenderRoads(text);
  } catch(e) {
    renderRoadsError();
  }
}

function parseAndRenderRoads(xml) {
  const el = document.getElementById('roads-list');
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');
    const items = doc.querySelectorAll('item');
    if (!items.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">✅</div>No active road alerts — all clear!</div>';
      updateRoadStatus(false);
      return;
    }
    let hasWarning = false, hasClosed = false;
    const html = Array.from(items).map(item => {
      const title = item.querySelector('title')?.textContent || 'Alert';
      const desc = item.querySelector('description')?.textContent || '';
      const pubDate = item.querySelector('pubDate')?.textContent || '';
      let severity = 'info';
      const t = title.toLowerCase();
      if (t.includes('closed') || t.includes('lokað')) { severity = 'closed'; hasClosed = true; }
      else if (t.includes('warning') || t.includes('viðvörun') || t.includes('slippery') || t.includes('icy')) { severity = 'warning'; hasWarning = true; }
      const date = pubDate ? new Date(pubDate).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) : '';
      return `
        <div class="alert-banner ${severity}">
          <div class="alert-title">${title}</div>
          <div class="alert-desc">${desc.replace(/<[^>]*>/g,'').substring(0,200)}</div>
          ${date ? `<div class="alert-meta">Updated ${date}</div>` : ''}
        </div>
      `;
    }).join('');
    el.innerHTML = html;
    updateRoadStatus(hasClosed, hasWarning);
  } catch(e) {
    renderRoadsError();
  }
}

function renderRoadsError() {
  document.getElementById('roads-list').innerHTML =
    '<div class="empty-state"><div class="icon">📡</div>Could not fetch road alerts.<br>Check safetravel.is directly.</div>';
}

function updateRoadStatus(closed, warning) {
  const dot = document.getElementById('road-dot');
  const label = document.getElementById('road-label');
  if (closed) { dot.className = 'dot danger'; label.textContent = 'Closures'; }
  else if (warning) { dot.className = 'dot warn'; label.textContent = 'Warnings'; }
  else { dot.className = 'dot'; label.textContent = 'Roads OK'; }
}

================================================================ */
function updateStatusBar() {
  // Find max wind across all fetched stations
  let maxWind = 0;
  Object.values(weatherData).forEach(d => {
    if (d && d.wind_speed_10m > maxWind) maxWind = d.wind_speed_10m;
  });
  const dot = document.getElementById('wind-dot');
  const label = document.getElementById('wind-label');
  const wc = windClass(maxWind);
  dot.className = 'dot' + (wc === 'wind-calm' ? '' : wc === 'wind-mod' ? ' warn' : ' danger');
  label.textContent = `${Math.round(maxWind)} m/s`;
}

function updateTime() {
  document.getElementById('last-updated').textContent =
    new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

/* ================================================================
   PWA + INSTALL
================================================================ */
function setupPWA() {
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(() => document.getElementById('install-banner').classList.add('show'), 3000);
  });
}

function doInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  }
  dismissInstall();
}

function dismissInstall() {
  document.getElementById('install-banner').classList.remove('show');
}

/* ================================================================
   OFFLINE
================================================================ */
function setupOfflineDetection() {
  const toast = document.getElementById('offline-toast');
  window.addEventListener('offline', () => toast.classList.add('show'));
  window.addEventListener('online', () => setTimeout(() => toast.classList.remove('show'), 2000));
  if (!navigator.onLine) toast.classList.add('show');
}

/* ================================================================
   SERVICE WORKER (register)
================================================================ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>

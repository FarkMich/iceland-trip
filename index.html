<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#1A2744"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Ring Road"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>Ring Road Iceland</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root{
      --bg:#0d1219;--surface:#1A2744;--surface2:#0f1a2e;--border:#2a3a5a;
      --text:#e0eefa;--text-muted:#7EC8E3;--text-dim:#4a6080;
      --accent:#E85D26;--accent-dim:rgba(232,93,38,.15);
      --ice:#7EC8E3;--ice-dim:rgba(126,200,227,.15);
      --green:#3fb950;--yellow:#d29922;--red:#f85149;
      --nav-h:64px;--drawer-peek:80px;
      --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
      --safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px);
      --radius:12px;--radius-sm:8px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
      -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
    button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
    a{color:var(--ice);text-decoration:none}

    /* ── SHELL ── */
    #app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);padding-bottom:var(--safe-bot)}
    #content{flex:1;min-height:0;position:relative}
    .tab-panel{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
    .tab-panel.active{display:flex}
    #bottom-nav{flex-shrink:0;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);
      display:flex;align-items:stretch;padding-left:var(--safe-left);padding-right:var(--safe-right)}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;padding:8px 4px;color:var(--text-dim);position:relative;transition:color .15s}
    .nav-btn.active{color:var(--accent)}
    .nav-btn.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;
      background:var(--accent);border-radius:0 0 2px 2px}
    .nav-btn svg{width:22px;height:22px}
    .nav-btn span{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}

    /* ── MAP TAB ── */
    #map-panel{position:relative}
    #map{position:absolute;inset:0}

    /* Layer toggles */
    .map-layers{position:absolute;top:14px;left:14px;z-index:900;display:flex;gap:6px;flex-wrap:wrap;max-width:260px}
    .layer-btn{padding:7px 12px;border-radius:20px;background:var(--surface);border:1px solid var(--border);
      font-size:11px;font-weight:700;color:var(--text-dim);box-shadow:0 3px 10px rgba(0,0,0,.5);transition:all .15s}
    .layer-btn.on{background:var(--ice-dim);border-color:var(--ice);color:var(--ice)}
    .layer-btn.on.lava{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

    /* FABs */
    .map-fabs{position:absolute;right:14px;top:14px;z-index:900;display:flex;flex-direction:column;gap:8px}
    .fab{width:44px;height:44px;border-radius:50%;background:var(--surface);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.5);
      transition:transform .1s,background .15s}
    .fab:active{transform:scale(.9)}
    .fab.active{background:var(--accent-dim);border-color:var(--accent)}
    .fab svg{width:19px;height:19px}

    /* ── BOTTOM DRAWER ── */
    #drawer{
      position:absolute;left:0;right:0;z-index:1000;
      background:var(--surface);border-top:1px solid var(--border);
      border-radius:var(--radius) var(--radius) 0 0;
      box-shadow:0 -8px 32px rgba(0,0,0,.6);
      transition:bottom .35s cubic-bezier(.4,0,.2,1);
      display:flex;flex-direction:column;
      max-height:82%;
    }
    #drawer.peek{bottom:0}
    #drawer.closed{bottom:calc(-100% + var(--drawer-peek))}

    .drawer-handle-row{flex-shrink:0;display:flex;align-items:center;padding:10px 16px 6px;gap:12px;cursor:pointer}
    .drawer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;flex-shrink:0}
    #drawer-summary{flex:1;display:flex;align-items:center;gap:10px;overflow:hidden}
    #drawer-summary-text{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #drawer-summary-sub{font-size:11px;color:var(--text-dim);white-space:nowrap}

    /* Filter chips inside drawer */
    .drawer-filters{flex-shrink:0;display:flex;gap:6px;padding:2px 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid var(--border)}
    .drawer-filters::-webkit-scrollbar{display:none}
    .df-btn{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;
      background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);transition:all .15s}
    .df-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

    /* Drawer item detail (single selected POI) */
    #drawer-detail{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 20px;display:none}
    #drawer-detail.show{display:block}
    .detail-name{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
    .detail-meta{font-size:12px;color:var(--text-muted);margin-bottom:12px}
    .detail-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:12px}
    .badge-green{background:rgba(63,185,80,.15);color:var(--green)}
    .badge-yellow{background:rgba(210,153,34,.15);color:var(--yellow)}
    .badge-blue{background:var(--ice-dim);color:var(--ice)}
    .detail-facilities{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
    .detail-facility{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
      background:var(--surface2);border:1px solid var(--border);color:var(--text-muted)}
    .detail-actions{display:flex;gap:8px;margin-top:4px}
    .detail-btn{flex:1;padding:13px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;text-align:center;transition:opacity .15s}
    .detail-btn:active{opacity:.7}
    .detail-btn-primary{background:var(--accent);color:#fff}
    .detail-btn-secondary{background:var(--surface2);color:var(--ice);border:1px solid var(--border)}

    /* Drawer list (multiple items) */
    #drawer-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
    #drawer-list.show{display:block}
    .dl-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
    .dl-item:active{background:var(--surface2)}
    .dl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .dl-body{flex:1;min-width:0}
    .dl-name{font-size:14px;font-weight:600;color:var(--text)}
    .dl-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
    .dl-dist{font-size:11px;color:var(--text-dim);flex-shrink:0}

    /* Route panel */
    #route-panel{position:absolute;left:14px;top:70px;z-index:900;width:calc(100% - 28px);max-width:320px;
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none}
    #route-panel.open{display:block}
    .rp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .rp-title{font-size:14px;font-weight:700;color:var(--text)}
    .rp-close{color:var(--text-dim);font-size:22px;line-height:1;padding:0 4px}
    .rp-stat{display:inline-flex;gap:4px;margin-right:10px;font-size:12px;color:var(--text-muted)}
    .rp-stat strong{color:var(--text)}
    .rp-camp{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--border);font-size:12px}
    .rp-camp .dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
    .rp-camp .n{flex:1;color:var(--text)}
    .rp-camp .d{color:var(--text-dim)}

    /* Leaflet overrides */
    .leaflet-control-zoom a{background:var(--surface)!important;color:var(--text)!important;border-color:var(--border)!important}
    .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--surface)!important;color:var(--text)!important;border:1px solid var(--border)!important;box-shadow:0 8px 24px rgba(0,0,0,.5)!important}
    .leaflet-container{font-family:inherit!important}
    .cluster-mk{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-sm);
      padding:4px 9px;display:flex;gap:5px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.5);
      cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap}
    .cluster-mk .cg{color:var(--green)}.cluster-mk .cb{color:var(--ice)}

    /* ── WEATHER TAB ── */
    #panel-weather{display:none;flex-direction:column}
    #panel-weather.active{display:flex}
    .w-chips{flex-shrink:0;display:flex;gap:8px;padding:10px 12px 8px;overflow-x:auto;
      -webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid var(--border)}
    .w-chips::-webkit-scrollbar{display:none}
    .w-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;
      background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);transition:all .15s}
    .w-chip.active{background:var(--ice-dim);border-color:var(--ice);color:var(--ice)}
    #wind-map-full{flex:1;min-height:0;position:relative}
    #wind-legend{position:absolute;bottom:16px;left:12px;z-index:1000;background:var(--surface);
      border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;
      display:flex;gap:8px;align-items:center;box-shadow:0 4px 12px rgba(0,0,0,.4)}
    .wl-i{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--text-muted)}
    .wl-d{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .wl-u{font-size:9px;color:var(--text-dim)}

    /* ── ROADS TAB ── */
    #panel-roads{display:none;flex-direction:column}
    #panel-roads.active{display:flex}
    .roads-bar{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);
      padding:10px 16px;display:flex;gap:8px;align-items:center}
    .roads-link{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;
      background:var(--surface2);border:1px solid var(--border);color:var(--ice);white-space:nowrap}
    .roads-link.em{color:var(--red)!important;border-color:var(--red)!important}
    .roads-chips{flex-shrink:0;display:flex;gap:6px;padding:10px 12px 6px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
    .roads-chips::-webkit-scrollbar{display:none}
    .roads-chip{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;
      background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);transition:all .15s}
    .roads-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    .road-card{margin:6px 12px;padding:12px 14px;border-radius:var(--radius-sm);border-left:4px solid;background:var(--surface)}
    .road-card.cat-A{border-color:var(--green);background:rgba(63,185,80,.06)}
    .road-card.cat-B{border-color:var(--yellow);background:rgba(210,153,34,.08)}
    .road-card.cat-C{border-color:var(--yellow);background:rgba(210,153,34,.08)}
    .road-card.cat-D{border-color:var(--red);background:rgba(248,81,73,.08)}
    .road-card.cat-E{border-color:var(--yellow);background:rgba(210,153,34,.08)}
    .road-card.cat-F{border-color:var(--orange);background:rgba(232,93,38,.08)}
    .road-card.cat-G{border-color:var(--orange);background:rgba(232,93,38,.08)}
    .road-card.cat-H{border-color:var(--red);background:rgba(248,81,73,.08)}
    .road-card.cat-J,.road-card.cat-K,.road-card.cat-L{border-color:var(--red);background:rgba(248,81,73,.1)}
    .road-card.cat-0{border-color:var(--border);background:var(--surface)}
    .rc-title{font-size:13px;font-weight:700;color:var(--text)}
    .rc-desc{font-size:12px;color:var(--text-muted);margin-top:3px}
    .rc-meta{font-size:11px;color:var(--text-dim);margin-top:5px}
    .rc-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
    .roads-section-header{padding:10px 14px 4px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim)}
    .all-clear{text-align:center;padding:40px 20px}
    .all-clear .icon{font-size:40px;margin-bottom:10px}
    .all-clear p{font-size:14px;color:var(--text-muted)}

    /* ── MISC ── */
    .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:12px;padding:40px 20px;color:var(--text-dim);font-size:14px;flex:1}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);
      border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #install-banner{position:fixed;bottom:calc(var(--nav-h)+var(--safe-bot)+8px);left:12px;right:12px;
      background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);
      padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);
      z-index:9999;transform:translateY(calc(100% + 80px));transition:transform .4s cubic-bezier(.4,0,.2,1)}
    #install-banner.show{transform:translateY(0)}
    #install-btn{padding:8px 14px;background:var(--accent);color:#fff;border-radius:var(--radius-sm);font-size:13px;font-weight:700;flex-shrink:0}
    #install-dismiss{padding:8px;color:var(--text-dim);font-size:20px}
    @media(min-width:640px){.nav-btn{max-width:120px}}
  </style>
</head>
<body>
<div id="app">
  <div id="content">

    <!-- ══ MAP (full screen, bottom drawer) ══════════════════════ -->
    <div class="tab-panel active" id="panel-map">
      <div id="map"></div>

      <!-- Layer toggles -->
      <div class="map-layers">
        <button class="layer-btn on lava" id="btn-camps"   onclick="toggleLayer('camps')">⛺ Camps</button>
        <button class="layer-btn on"      id="btn-sights"  onclick="toggleLayer('sights')">✦ Sights</button>
        <button class="layer-btn on"      id="btn-wind"    onclick="toggleLayer('wind')">💨 Wind</button>
        <button class="layer-btn"         id="btn-petrol"  onclick="toggleLayer('petrol')">⛽ Fuel</button>
        <button class="layer-btn"         id="btn-grocery" onclick="toggleLayer('grocery')">🛒 Stores</button>
      </div>

      <!-- FABs -->
      <div class="map-fabs">
        <button class="fab" id="fab-nearby" onclick="toggleNearby()" title="Near me">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/><circle cx="12" cy="12" r="9" stroke-dasharray="4 2"/></svg>
        </button>
        <button class="fab" onclick="fitIceland()" title="Fit Iceland">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
        </button>
      </div>

      <!-- Route panel -->
      <div id="route-panel">
        <div class="rp-header">
          <span class="rp-title" id="rp-title">Route planner</span>
          <button class="rp-close" onclick="closeRoute()">×</button>
        </div>
        <div id="rp-stats"></div>
        <div id="rp-camps"></div>
      </div>

      <!-- Bottom drawer -->
      <div id="drawer" class="closed">
        <div class="drawer-handle-row" onclick="toggleDrawer()">
          <div class="drawer-handle"></div>
          <div id="drawer-summary">
            <div>
              <div id="drawer-summary-text">Tap a marker for details</div>
              <div id="drawer-summary-sub">or drag up to browse all</div>
            </div>
          </div>
        </div>
        <div class="drawer-filters" id="drawer-filters">
          <button class="df-btn active" onclick="setDrawerFilter('all',this)">All</button>
          <button class="df-btn" onclick="setDrawerFilter('camp',this)">⛺ Camps</button>
          <button class="df-btn" onclick="setDrawerFilter('sight',this)">✦ Sights</button>
          <button class="df-btn" onclick="setDrawerFilter('petrol',this)">⛽ Fuel</button>
          <button class="df-btn" onclick="setDrawerFilter('grocery',this)">🛒 Stores</button>
        </div>
        <div id="drawer-detail"></div>
        <div id="drawer-list"></div>
      </div>
    </div>

    <!-- ══ WEATHER ══════════════════════════════════════════════ -->
    <div class="tab-panel" id="panel-weather">
      <div class="w-chips" id="w-chips"></div>
      <div id="wind-map-full">
        <div id="wind-legend">
          <div class="wl-i"><div class="wl-d" style="background:#3fb950"></div><span>Calm</span></div>
          <div class="wl-i"><div class="wl-d" style="background:#d29922"></div><span>Mod</span></div>
          <div class="wl-i"><div class="wl-d" style="background:#E85D26"></div><span>Strong</span></div>
          <div class="wl-i"><div class="wl-d" style="background:#f85149"></div><span>Storm</span></div>
          <div class="wl-u">m/s</div>
        </div>
      </div>
    </div>

    <!-- ══ ROADS ════════════════════════════════════════════════ -->
    <div class="tab-panel" id="panel-roads">
      <div class="roads-bar">
        <div id="roads-updated" style="font-size:11px;color:var(--text-dim);flex:1">Loading…</div>
        <a class="roads-link" href="https://umferdin.is/en" target="_blank">umferdin.is ↗</a>
        <a class="roads-link em" href="tel:112">📞 112</a>
      </div>
      <!-- Filter chips -->
      <div class="roads-chips" id="roads-chips">
        <button class="roads-chip active" onclick="filterRoads('all',this)">All</button>
        <button class="roads-chip" onclick="filterRoads('ring',this)">🔵 Ring Road</button>
        <button class="roads-chip" onclick="filterRoads('bad',this)">⚠️ Alerts only</button>
      </div>
      <div class="panel-scroll" id="roads-list">
        <div class="loading-state"><div class="spinner"></div>Fetching road conditions…</div>
      </div>
    </div>

  </div><!-- /content -->

  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="map" onclick="switchTab('map',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      <span>Explore</span>
    </button>
    <button class="nav-btn" data-tab="weather" onclick="switchTab('weather',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/></svg>
      <span>Weather</span>
    </button>
    <button class="nav-btn" data-tab="roads" onclick="switchTab('roads',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v9a2 2 0 01-2 2h-2"/><circle cx="9" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
      <span>Roads</span>
    </button>
  </nav>
</div>

<div id="install-banner">
  <div style="font-size:26px;flex-shrink:0">🏔️</div>
  <div style="flex:1"><strong style="display:block;font-size:14px">Add to Home Screen</strong><small style="font-size:12px;color:var(--text-dim)">Offline maps + live alerts</small></div>
  <button id="install-btn" onclick="doInstall()">Install</button>
  <button id="install-dismiss" onclick="dismissInstall()">×</button>
</div>


<script>
/* ================================================================ DATA */
const CAMPSITES=[

/* ── CLUSTERS & MARKERS ─────────────────────────────────────── */
function haversine(a,b,c,d){
  const R=6371,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function cluster(items,r){
  const used=new Set(),out=[];
  items.forEach((it,i)=>{
    if(used.has(i))return;
    const g=[it];used.add(i);
    items.forEach((o,j)=>{if(i!==j&&!used.has(j)&&haversine(it.lat,it.lng,o.lat,o.lng)<r){g.push(o);used.add(j);}});
    out.push({lat:g.reduce((s,x)=>s+x.lat,0)/g.length,lng:g.reduce((s,x)=>s+x.lng,0)/g.length,items:g});
  });
  return out;
}
function clearAllMarkers(){
  clusterGroup.forEach(m=>map.removeLayer(m));clusterGroup=[];
  Object.values(campMarkers).forEach(m=>map.removeLayer(m));campMarkers={};
  Object.values(sightMarkers).forEach(m=>map.removeLayer(m));sightMarkers={};
}
function refreshMapMarkers(){
  clearAllMarkers();
  const z=map.getZoom();
  const r=z<=5?150:z<=6?90:z<=7?55:0;
  if(r>0){
    if(layers.camps){
      cluster(CAMPSITES,r).forEach(c=>{
        const m=c.items.length===1?makeCampMarker(c.items[0]):makeClusterMarker(c.items.length,'camp',c);
        clusterGroup.push(m);m.addTo(map);
      });
    }
    if(layers.sights){
      cluster(SIGHTS,r).forEach(c=>{
        const m=c.items.length===1?makeSightMarker(c.items[0]):makeClusterMarker(c.items.length,'sight',c);
        clusterGroup.push(m);m.addTo(map);
      });
    }
  } else {
    if(layers.camps)CAMPSITES.forEach(c=>{const m=makeCampMarker(c);campMarkers[c.name]=m;m.addTo(map);});
    if(layers.sights)SIGHTS.forEach(s=>{const m=makeSightMarker(s);sightMarkers[s.name]=m;m.addTo(map);});
  }
}
function makeCampMarker(c){
  const m=L.circleMarker([c.lat,c.lng],{radius:9,fillColor:'#3fb950',color:'#0d1219',weight:2,fillOpacity:1});
  m.on('click',e=>{L.DomEvent.stopPropagation(e);showCampDetail(c);});
  return m;
}
function makeSightMarker(s){
  const m=L.circleMarker([s.lat,s.lng],{radius:9,fillColor:'#7EC8E3',color:'#0d1219',weight:2,fillOpacity:1});
  m.on('click',e=>{L.DomEvent.stopPropagation(e);showSightDetail(s);});
  return m;
}
function makeClusterMarker(count,type,c){
  const el=document.createElement('div');el.className='cluster-mk';
  el.innerHTML=type==='camp'?`<span class="cg">⛺ ${count}</span>`:`<span class="cb">✦ ${count}</span>`;
  const m=L.marker([c.lat,c.lng],{icon:L.divIcon({html:el,className:'',iconAnchor:[30,16]})});
  m.on('click',()=>{
    if(count===1){type==='camp'?showCampDetail(c.items[0]):showSightDetail(c.items[0]);}
    else{map.setView([c.lat,c.lng],map.getZoom()+3);}
  });
  return m;
}

function openDrawer(){
  drawerOpen=true;
  document.getElementById('drawer').className='peek';
}
function closeDrawer(){
  drawerOpen=false;
  document.getElementById('drawer').className='closed';
}
function showDrawerList(){
  document.getElementById('drawer-detail').className='';
  document.getElementById('drawer-list').className='show';
  const all=buildPOIList();
  const items=drawerFilter==='all'?all:all.filter(p=>p.type===drawerFilter);
  const cm={camp:'#3fb950',sight:'#7EC8E3',petrol:'#E85D26',grocery:'#d29922'};
  document.getElementById('drawer-list').innerHTML=items.length
    ?items.map(p=>`<div class="dl-item" onclick="showPOIDetail('${p.type}','${encodeURIComponent(p.name)}')">
        <div class="dl-dot" style="background:${cm[p.type]||'#7EC8E3'}"></div>
        <div class="dl-body"><div class="dl-name">${p.name}</div><div class="dl-sub">${p.sub}</div></div>
        ${p.dist?`<div class="dl-dist">${Math.round(p.dist)} km</div>`:''}
      </div>`).join('')
    :'<div style="padding:24px;text-align:center;color:var(--text-dim)">Nothing to show</div>';
  document.getElementById('drawer-summary-text').textContent=`${items.length} locations`;
  document.getElementById('drawer-summary-sub').textContent=drawerFilter==='all'?'All layers':'Filtered';
}
function buildPOIList(){
  const out=[];
  CAMPSITES.forEach(c=>out.push({type:'camp',name:c.name,sub:c.note+' · '+c.type,dist:userLat?haversine(userLat,userLng,c.lat,c.lng):null,lat:c.lat,lng:c.lng}));
  SIGHTS.forEach(s=>out.push({type:'sight',name:s.emoji+' '+s.name,sub:s.cat,dist:userLat?haversine(userLat,userLng,s.lat,s.lng):null,lat:s.lat,lng:s.lng}));
  petrolMarkers.forEach(m=>{const ll=m.getLatLng();out.push({type:'petrol',name:'⛽ '+(m._name||'Petrol'),sub:'Fuel station',dist:userLat?haversine(userLat,userLng,ll.lat,ll.lng):null,lat:ll.lat,lng:ll.lng});});
  groceryMarkers.forEach(m=>{const ll=m.getLatLng();out.push({type:'grocery',name:'🛒 '+(m._name||'Store'),sub:'Grocery',dist:userLat?haversine(userLat,userLng,ll.lat,ll.lng):null,lat:ll.lat,lng:ll.lng});});
  if(userLat)out.sort((a,b)=>(a.dist||999)-(b.dist||999));
  return out;
}
function setDrawerFilter(f,btn){
  drawerFilter=f;
  document.querySelectorAll('.df-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

function showPOIDetail(type,encodedName){
  const name=decodeURIComponent(encodedName);
  if(type==='camp'){const c=CAMPSITES.find(x=>x.name===name);if(c)showCampDetail(c);}
  else if(type==='sight'){const s=SIGHTS.find(x=>x.emoji+' '+x.name===name||x.name===name);if(s)showSightDetail(s);}
}
function showCampDetail(c){
  const bc={Premium:'badge-blue',Basic:'badge-green',NP:'badge-yellow'};
  const stars='★'.repeat(Math.round(c.rating||0))+'☆'.repeat(5-Math.round(c.rating||0));
  document.getElementById('drawer-detail').innerHTML=`
    <div class="detail-name">${c.name}</div>
    <div class="detail-meta">${stars} ${c.rating||''} · ${c.note}</div>
    <div class="detail-badge ${bc[c.type]||'badge-green'}">${c.type}</div>
    <div class="detail-facilities">${(c.facilities||[]).map(f=>`<span class="detail-facility">${f}</span>`).join('')}</div>
    <div class="detail-actions">
      <a href="${c.gmaps}" target="_blank" class="detail-btn detail-btn-primary">Navigate</a>
      <button class="detail-btn detail-btn-secondary" onclick="startRoute(CAMPSITES.find(x=>x.name==='${c.name.replace(/'/g,"\\'")}'))">Plan route</button>
    </div>`;
  document.getElementById('drawer-detail').className='show';
  document.getElementById('drawer-list').className='';
  document.getElementById('drawer-summary-text').textContent=c.name.split('–')[0].trim();
  document.getElementById('drawer-summary-sub').textContent=c.type+' · tap to collapse';
  openDrawer();
  map.panTo([c.lat,c.lng],{animate:true});
  // Highlight marker
  Object.values(campMarkers).forEach(m=>m.setStyle({fillColor:'#3fb950',radius:9}));
  if(campMarkers[c.name])campMarkers[c.name].setStyle({fillColor:'#E85D26',radius:13});
}

function toggleLayer(name){
  layers[name]=!layers[name];

  if(name==='grocery'){layers.grocery?fetchGrocery():groceryMarkers.forEach(m=>map.removeLayer(m));}
}

  nearbyActive=true;
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;userLng=pos.coords.longitude;
    map.setView([userLat,userLng],10,{animate:true});
    if(userMarker)map.removeLayer(userMarker);
    userMarker=L.circleMarker([userLat,userLng],{radius:10,fillColor:'#E85D26',color:'#fff',weight:2,fillOpacity:1}).addTo(map);
    if(radiusCircle)map.removeLayer(radiusCircle);
    radiusCircle=L.circle([userLat,userLng],{radius:50000,color:'#7EC8E3',fillColor:'#7EC8E3',fillOpacity:.04,weight:1.5,dashArray:'6 4'}).addTo(map);
    drawerFilter='all';
    document.querySelectorAll('.df-btn').forEach((b,i)=>{b.classList.toggle('active',i===0);});
    showDrawerList();openDrawer();
  },()=>{userLat=64.13;userLng=-21.90;showDrawerList();openDrawer();});
}

/* ── ROUTE PLANNER ──────────────────────────────────────────── */
function startRoute(startCamp){
  closeDrawer();
  routeStart=startCamp;
  document.getElementById('route-panel').classList.add('open');
  document.getElementById('rp-title').textContent='Tap destination camp';
  document.getElementById('rp-stats').innerHTML='<span style="color:var(--text-dim);font-size:12px">Tap any camp to set destination</span>';
  document.getElementById('rp-camps').innerHTML='';
  refreshMapMarkers();
  Object.values(campMarkers).forEach(m=>{
    m.off('click');
    const camp=CAMPSITES.find(c=>Math.abs(c.lat-m.getLatLng().lat)<0.001&&Math.abs(c.lng-m.getLatLng().lng)<0.001);
    if(camp&&camp.name!==routeStart.name)m.on('click',e=>{L.DomEvent.stopPropagation(e);buildRoute(camp);});
  });
}
function buildRoute(end){
  if(routeLayer){map.removeLayer(routeLayer);}
  routeLayer=L.polyline([[routeStart.lat,routeStart.lng],[end.lat,end.lng]],{color:'#E85D26',weight:4,dashArray:'8 5',opacity:.9}).addTo(map);
  map.fitBounds(routeLayer.getBounds(),{padding:[60,60]});
  const dist=Math.round(haversine(routeStart.lat,routeStart.lng,end.lat,end.lng));
  const eta=Math.round(dist/65*60),h=Math.floor(eta/60),m=eta%60;
  function distToSeg(pLat,pLng,aLat,aLng,bLat,bLng){
    const dx=bLng-aLng,dy=bLat-aLat;
    if(!dx&&!dy)return haversine(pLat,pLng,aLat,aLng);
    const t=Math.max(0,Math.min(1,((pLng-aLng)*dx+(pLat-aLat)*dy)/(dx*dx+dy*dy)));
    return haversine(pLat,pLng,aLat+t*dy,aLng+t*dx);
  }
  const along=CAMPSITES.filter(c=>c.name!==routeStart.name&&c.name!==end.name&&distToSeg(c.lat,c.lng,routeStart.lat,routeStart.lng,end.lat,end.lng)<30);
  document.getElementById('rp-title').textContent=routeStart.name.split('–')[0].trim()+' → '+end.name.split('–')[0].trim();
  document.getElementById('rp-stats').innerHTML=`<span class="rp-stat"><strong>${dist} km</strong></span><span class="rp-stat"><strong>~${h}h ${m}m</strong></span><span class="rp-stat" style="color:var(--green)"><strong>${along.length}</strong> camps en route</span>`;
  document.getElementById('rp-camps').innerHTML=along.map(c=>`<div class="rp-camp"><div class="dot"></div><span class="n">${c.name.split('–')[0].trim()}</span><span class="d">${Math.round(haversine(routeStart.lat,routeStart.lng,c.lat,c.lng))}km</span></div>`).join('');
  // Restore camp clicks
  Object.values(campMarkers).forEach(m=>{
    m.off('click');
    const camp=CAMPSITES.find(c=>Math.abs(c.lat-m.getLatLng().lat)<0.001);
    if(camp)m.on('click',e=>{L.DomEvent.stopPropagation(e);showCampDetail(camp);});
  });
}
function closeRoute(){
  document.getElementById('route-panel').classList.remove('open');
  if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}
  routeStart=null;
  Object.values(campMarkers).forEach(m=>{
    m.off('click');
    const camp=CAMPSITES.find(c=>Math.abs(c.lat-m.getLatLng().lat)<0.001);
    if(camp)m.on('click',e=>{L.DomEvent.stopPropagation(e);showCampDetail(camp);});
  });
}

/* ── OVERPASS ───────────────────────────────────────────────── */
const BBOX='63.0,-25.0,67.0,-13.0';
async function fetchPetrol(){
  if(petrolMarkers.length){petrolMarkers.forEach(m=>m.addTo(map));return;}
  try{
    const q=`[out:json][timeout:25];node["amenity"="fuel"](${BBOX});out body;`;
    const d=await(await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q)})).json();
    d.elements.forEach(el=>{
      const name=el.tags?.name||el.tags?.brand||'Petrol';
      const icon=L.divIcon({html:`<div style="width:12px;height:12px;border-radius:50%;background:#E85D26;border:2px solid #0d1219"></div>`,className:'',iconAnchor:[6,6]});
      const m=L.marker([el.lat,el.lon],{icon}).addTo(map);
      m._name=name;m._lat=el.lat;m._lng=el.lon;
      m.on('click',e=>{L.DomEvent.stopPropagation(e);
        document.getElementById('drawer-detail').innerHTML=`<div class="detail-name">⛽ ${name}</div><div class="detail-meta">Petrol station</div><div class="detail-actions"><a href="https://maps.google.com/?q=${el.lat},${el.lon}" target="_blank" class="detail-btn detail-btn-primary">Navigate</a></div>`;
        document.getElementById('drawer-detail').className='show';document.getElementById('drawer-list').className='';openDrawer();
      });
      petrolMarkers.push(m);
    });
  }catch(e){console.warn('Petrol fail',e);}
}
async function fetchGrocery(){
  if(groceryMarkers.length){groceryMarkers.forEach(m=>m.addTo(map));return;}
  const btn=document.getElementById('btn-grocery');
  btn.textContent='🛒 Loading…';
  try{
    const known=['bonus','krónan','nettó','hagkaup','kjarval','10-11','samkaup'];
    const q=`[out:json][timeout:30];(node["shop"="supermarket"](${BBOX});node["shop"="convenience"]["name"~"Bonus|Krona|Netto|Hagkaup|10-11|Samkaup",i](${BBOX}););out body;`;
    const res=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q)});
    if(!res.ok)throw new Error('Overpass error '+res.status);
    const d=await res.json();
    if(!d.elements?.length){btn.textContent='🛒 Stores';return;}
    d.elements.forEach(el=>{
      const name=el.tags?.name||el.tags?.brand||'Store';
      const b=(el.tags?.brand||el.tags?.name||'').toLowerCase();
      const isK=known.some(k=>b.includes(k));
      const icon=L.divIcon({html:`<div style="width:12px;height:12px;border-radius:2px;background:${isK?'#d29922':'#666'};border:2px solid #0d1219"></div>`,className:'',iconAnchor:[6,6]});
      const m=L.marker([el.lat,el.lon],{icon}).addTo(map);
      m._name=name;
      m.on('click',e=>{L.DomEvent.stopPropagation(e);
        document.getElementById('drawer-detail').innerHTML=`<div class="detail-name">🛒 ${name}</div><div class="detail-meta">Grocery store</div><div class="detail-actions"><a href="https://maps.google.com/?q=${el.lat},${el.lon}" target="_blank" class="detail-btn detail-btn-primary">Navigate</a></div>`;
        document.getElementById('drawer-detail').className='show';document.getElementById('drawer-list').className='';openDrawer();
      });
      groceryMarkers.push(m);
    });
    btn.textContent=`🛒 Stores (${d.elements.length})`;
  }catch(e){
    console.warn('Grocery fail',e);
    btn.textContent='🛒 Failed';
    layers.grocery=false;btn.classList.remove('on');
    setTimeout(()=>btn.textContent='🛒 Stores',3000);
  }
}

/* ================================================================ WEATHER MAP */
function initWindMap(){
  windMap=L.map('wind-map-full',{center:[65.0,-19.0],minZoom:5,maxZoom:12,
    zoomControl:false,attributionControl:false,
    maxBounds:ICELAND_BOUNDS,maxBoundsViscosity:0.7});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:13}).addTo(windMap);
  L.control.zoom({position:'bottomright'}).addTo(windMap);
  windMap.fitBounds(ICELAND_BOUNDS);
}
function renderWeatherChips(){
  document.getElementById('w-chips').innerHTML=STATIONS.map(s=>
    `<button class="w-chip" onclick="selectStation('${s.id}')">${s.name}</button>`
  ).join('');
}
function selectStation(id){
  document.querySelectorAll('.w-chip').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.w-chip').forEach(b=>{if(b.textContent===STATIONS.find(s=>s.id===id)?.name)b.classList.add('active');});
  const s=STATIONS.find(x=>x.id===id);
  if(s&&windMap){
    windMap.setView([s.lat,s.lng],9,{animate:true});
    const marker=windMapMarkers[STATIONS.findIndex(x=>x.id===id)];
    if(marker)setTimeout(()=>marker.openPopup(),400);
  }
}
async function fetchWeather(){
  try{
    const res=await Promise.allSettled(STATIONS.map(s=>
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&current=temperature_2m,wind_speed_10m,wind_gusts_10m,precipitation,weather_code&wind_speed_unit=ms&timezone=Atlantic%2FReykjavik`)
        .then(r=>r.json()).then(d=>({id:s.id,data:d.current}))
    ));
    res.forEach(r=>{if(r.status==='fulfilled'&&r.value.data)weatherData[r.value.id]=r.value.data;});
    updateWindMarkers();updateWindMapMarkers();
  }catch(e){console.warn('Weather fail',e);}
}
function updateWindMapMarkers(){
  windMapMarkers.forEach(m=>windMap&&windMap.removeLayer(m));windMapMarkers=[];
  if(!windMap)return;
  STATIONS.forEach(s=>{
    const d=weatherData[s.id];if(!d)return;
    const ws=d.wind_speed_10m,gu=d.wind_gusts_10m,tmp=d.temperature_2m;
    const r=Math.max(18,Math.min(46,ws*2.0));
    const color=windColor(ws);
    const icon=L.divIcon({
      html:`<div style="width:${r*2}px;height:${r*2}px;border-radius:50%;background:${color};opacity:0.88;border:3px solid rgba(255,255,255,0.25);display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.1;cursor:pointer">
        <div style="font-size:${r>24?13:10}px;font-weight:800;color:white">${Math.round(ws)}</div>
        <div style="font-size:8px;color:rgba(255,255,255,0.75)">m/s</div>
      </div>`,className:'',iconAnchor:[r,r]
    });
    const m=L.marker([s.lat,s.lng],{icon}).addTo(windMap);
    m.bindPopup(`<div style="min-width:150px">
      <div style="font-weight:700;font-size:14px;margin-bottom:8px">${s.name}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase">Wind</div><div style="font-size:20px;font-weight:800;color:${color}">${Math.round(ws)} m/s</div></div>
        <div><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase">Gusts</div><div style="font-size:20px;font-weight:800;color:${windColor(gu)}">${Math.round(gu)} m/s</div></div>
        <div><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase">Temp</div><div style="font-size:20px;font-weight:800">${Math.round(tmp)}°C</div></div>
        <div><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase">Sky</div><div style="font-size:20px">${wmoIcon(d.weather_code)}</div></div>
      </div></div>`,{maxWidth:210});
    windMapMarkers.push(m);
  });
}
function updateWindMarkers(){
  windMarkers.forEach(m=>map&&map.removeLayer(m));windMarkers=[];
  if(!map)return;
  STATIONS.forEach(s=>{
    const d=weatherData[s.id];if(!d)return;
    const ws=d.wind_speed_10m,r=Math.max(7,Math.min(22,ws*1.1));
    const color=windColor(ws);
    const icon=L.divIcon({html:`<div style="width:${r*2}px;height:${r*2}px;border-radius:50%;background:${color};opacity:0.72;border:2px solid #0d1219;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:white">${Math.round(ws)}</div>`,className:'',iconAnchor:[r,r]});
    const m=L.marker([s.lat,s.lng],{icon});
    m.on('click',e=>{L.DomEvent.stopPropagation(e);showCampDetail||map.panTo([s.lat,s.lng]);
      document.getElementById('drawer-detail').innerHTML=`<div class="detail-name">💨 ${s.name}</div><div class="detail-meta">Weather station</div><p style="font-size:13px;line-height:1.7;color:var(--text-muted)">Wind <strong style="color:${color}">${Math.round(ws)} m/s</strong> &nbsp;·&nbsp; Gusts <strong style="color:${windColor(d.wind_gusts_10m)}">${Math.round(d.wind_gusts_10m)} m/s</strong><br>Temperature <strong>${Math.round(d.temperature_2m)}°C</strong> &nbsp;·&nbsp; ${wmoIcon(d.weather_code)}</p>`;
      document.getElementById('drawer-detail').className='show';document.getElementById('drawer-list').className='';openDrawer();
    });
    if(layers.wind)m.addTo(map);
    windMarkers.push(m);
  });
}
function windColor(ms){return ms<8?'#3fb950':ms<14?'#d29922':ms<20?'#E85D26':'#f85149';}
function wmoIcon(c){if(c===0)return'☀️';if(c<=3)return'⛅';if(c<=9)return'🌫️';if(c<=59)return'🌧️';if(c<=79)return'❄️';return'⛈️';}
function windClass(ms){return ms<8?'wind-calm':ms<14?'wind-mod':ms<20?'wind-strong':'wind-storm';}

/* ================================================================ ROADS */
let allRoadSegments = [];
let roadsFilter = 'all';

const ROAD_GQL = 'https://umferdin.is/graphql?operationName=RoadCondition&variables=%7B%22testdata%22%3Afalse%2C%22lang%22%3A%22EN%22%7D&extensions=%7B%22persistedQuery%22%3A%7B%22version%22%3A1%2C%22sha256Hash%22%3A%221c9bbebf0182c4535b4afba0fc7e58045dd764c5a1e93c5f84aa5b0d7b8a02eb%22%7D%7D';

const CAT_LABEL = {
  'A':'Easily passable','B':'Spots of ice','C':'Slippery','D':'Extremely slippery',
  'E':'Wet snow','F':'Snow','G':'Difficult driving','H':'Difficult road conditions',
  'J':'Impassable','K':'Impassable','L':'Closed','0':'Unknown'
};
const CAT_SEVERITY = {
  'A':0,'0':0,'B':1,'C':1,'E':1,'F':2,'G':2,'H':2,'D':3,'J':3,'K':3,'L':3
};
const CAT_ICON = {
  'A':'✅','B':'🟡','C':'🟡','D':'🔴','E':'🟡','F':'🟠','G':'🟠','H':'🔴',
  'J':'🚫','K':'🚫','L':'🚫','0':'⬜'
};

async function fetchRoads(){
  try{
    // Call umferdin.is GraphQL directly — works from browser, no proxy needed
    const res = await fetch(ROAD_GQL, {
      headers: { 'Accept': 'application/json' }
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    const data = json?.data?.RoadCondition;
    if(!data) throw new Error('No data');

    allRoadSegments = data.results;

    const updated = new Date(data.lastUpdate);
    document.getElementById('roads-updated').textContent =
      'Updated ' + updated.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

    renderRoads();
  } catch(e) {
    console.warn('Roads fail', e);
    document.getElementById('roads-list').innerHTML =
      '<div class="all-clear"><div class="icon">📡</div><p>Could not load road conditions.<br><a href="https://umferdin.is/en" target="_blank" style="color:var(--ice)">Open umferdin.is ↗</a></p></div>';
    document.getElementById('roads-updated').textContent = 'Failed to load';
  }
}

function filterRoads(f, btn){
  roadsFilter = f;
  document.querySelectorAll('.roads-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderRoads();
}

function renderRoads(){
  let segs = allRoadSegments;

  // Apply filter
  if(roadsFilter === 'ring'){
    segs = segs.filter(r => r.roads?.some(x => x.nr === '1'));
  } else if(roadsFilter === 'bad'){
    segs = segs.filter(r => CAT_SEVERITY[r.condition.category] >= 1);
  }

  // Sort: worst first, then by name
  segs = [...segs].sort((a,b) => {
    const sd = CAT_SEVERITY[b.condition.category] - CAT_SEVERITY[a.condition.category];
    return sd !== 0 ? sd : a.name.localeCompare(b.name);
  });

  // Skip "Not known" segments in "Alerts only" view
  if(roadsFilter === 'bad'){
    segs = segs.filter(r => r.condition.category !== '0');
  }

  if(!segs.length){
    document.getElementById('roads-list').innerHTML =
      '<div class="all-clear"><div class="icon">✅</div><p>No issues on the Ring Road — all clear.</p></div>';
    return;
  }

  // Group by severity
  const closed   = segs.filter(r => ['L','J','K'].includes(r.condition.category));
  const bad      = segs.filter(r => ['D','G','H'].includes(r.condition.category));
  const caution  = segs.filter(r => ['B','C','E','F'].includes(r.condition.category));
  const clear    = segs.filter(r => r.condition.category === 'A');
  const unknown  = segs.filter(r => r.condition.category === '0');

  let html = '';

  if(closed.length){
    html += `<div class="roads-section-header">🚫 Closed / Impassable (${closed.length})</div>`;
    html += closed.map(r=>roadCard(r)).join('');
  }
  if(bad.length){
    html += `<div class="roads-section-header">🔴 Difficult conditions (${bad.length})</div>`;
    html += bad.map(r=>roadCard(r)).join('');
  }
  if(caution.length){
    html += `<div class="roads-section-header">🟡 Caution (${caution.length})</div>`;
    html += caution.map(r=>roadCard(r)).join('');
  }
  if(clear.length && roadsFilter !== 'bad'){
    html += `<div class="roads-section-header">✅ Clear (${clear.length})</div>`;
    html += clear.map(r=>roadCard(r)).join('');
  }
  if(unknown.length && roadsFilter === 'all'){
    html += `<div class="roads-section-header">⬜ Unknown (${unknown.length})</div>`;
    html += unknown.map(r=>roadCard(r)).join('');
  }

  document.getElementById('roads-list').innerHTML = html;
}

function roadCard(r){
  const cat = r.condition.category;
  const routes = r.roads?.map(x=>'Rt '+x.nr).join(' · ') || '';
  const time = r.condition.date
    ? new Date(r.condition.date).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})
    : '';
  return `<div class="road-card cat-${cat}">
    <div class="rc-title">${r.name}<span class="rc-badge" style="background:rgba(255,255,255,0.08);color:var(--text-muted)">${routes}</span></div>
    <div class="rc-desc">${CAT_ICON[cat]||''} ${CAT_LABEL[cat]||cat}</div>
    ${time?`<div class="rc-meta">Updated ${time}</div>`:''}
  </div>`;
}
